name: Build APK

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: |
          cd /tmp
          mkdir -p gradle-gen && cd gradle-gen
          echo 'rootProject.name = "temp"' > settings.gradle
          gradle wrapper --gradle-version 8.5
          cd "$GITHUB_WORKSPACE/android"
          mkdir -p gradle/wrapper
          cp /tmp/gradle-gen/gradlew /tmp/gradle-gen/gradlew.bat .
          cp /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.jar /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew
          rm -rf /tmp/gradle-gen

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT
          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # 更新 versionName
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle

          # 计算 versionCode
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Build Rust server for Android (arm64)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # 创建 linker 配置
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          ar = "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          EOF

          # 编译 arm64 版本
          cd server
          cargo build --release --target aarch64-linux-android
          # 复制到 assets 目录
          mkdir -p ../android/app/src/main/assets
          cp target/aarch64-linux-android/release/taskmod-server \
             ../android/app/src/main/assets/taskmod-server

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             TaskMod-v${VERSION}-release.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             TaskMod-v${VERSION}-debug.apk 2>/dev/null || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-APK-${{ steps.version.outputs.version }}
          path: |
            TaskMod-*.apk
            android/app/build/outputs/apk/**/*.apk

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskMod APK ${{ steps.version.outputs.tag }}
          body: |
            ## TaskMod APK ${{ steps.version.outputs.version }}

            ### 功能
            - 通知栏常驻服务（保活：WakeLock + startForeground + onTaskRemoved 重启）
            - 持久化 su shell 提升 Root 命令执行效率
            - 进程监控线程自动检测 server 意外退出
            - 快捷操作（截屏/解锁/重启）
            - Quick Settings 磁贴
            - 桌面小组件
            - 开机自启
            - 自动更新检测
            - 内置 WebView 管理面板
            - Root 检测与 Magisk 模块引导

            ### 安装
            1. 下载 APK 文件
            2. 允许安装未知来源应用
            3. 安装并打开

            ### 注意
            - 设备控制功能需要 Root 权限
            - AI 聊天功能无需 Root
            - 建议同时安装 Magisk 模块获得完整功能
          files: |
            TaskMod-*.apk
          draft: false
          prerelease: false