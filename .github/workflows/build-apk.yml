name: Build APK

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT
          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # 更新 versionName
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle

          # 计算 versionCode
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             TaskMod-v${VERSION}-release.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             TaskMod-v${VERSION}-debug.apk 2>/dev/null || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-APK-${{ steps.version.outputs.version }}
          path: |
            TaskMod-*.apk
            android/app/build/outputs/apk/**/*.apk

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskMod APK ${{ steps.version.outputs.tag }}
          body: |
            ## TaskMod APK ${{ steps.version.outputs.version }}

            ### 功能
            - 通知栏常驻服务（保活）
            - 快捷操作（截屏/解锁/重启）
            - Quick Settings 磁贴
            - 桌面小组件
            - 开机自启
            - 自动更新检测
            - 内置 WebView 管理面板
            - Root 检测与 Magisk 模块引导

            ### 安装
            1. 下载 APK 文件
            2. 允许安装未知来源应用
            3. 安装并打开

            ### 注意
            - 设备控制功能需要 Root 权限
            - AI 聊天功能无需 Root
            - 建议同时安装 Magisk 模块获得完整功能
          files: |
            TaskMod-*.apk
          draft: false
          prerelease: false
