name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.2)'
        required: true
        default: 'v1.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Update version
        id: version
        run: |
          # 优先使用手动输入的版本号，否则从 tag 提取
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

          # 去掉 v 前缀用于文件更新
          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # 计算 versionCode (1.0.1 -> 1000001)
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

          # 更新 module.prop
          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

          # 更新 Cargo.toml
          sed -i "0,/^version = \".*\"/s/^version = \".*\"/version = \"$VERSION\"/" server/Cargo.toml

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Build
        working-directory: server
        run: cargo ndk -t arm64-v8a build --release

      - name: Package
        id: package
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # 将编译产物复制到模块目录
          mkdir -p bin/arm64
          cp server/target/aarch64-linux-android/release/taskmod-server bin/arm64/
          chmod +x bin/arm64/taskmod-server

          # 打包 Magisk 模块 (从仓库根目录打包)
          zip -r TaskMod-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "server/*" \
            -x ".gitignore" \
            -x "bin/.gitkeep"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-${{ steps.version.outputs.version }}
          path: TaskMod-${{ steps.version.outputs.version }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskMod ${{ steps.version.outputs.tag }}
          body: |
            ## TaskMod ${{ steps.version.outputs.version }}

            ### 功能
            - 定时任务调度
            - Web 管理面板 (端口 8080)
            - 截图管理 (系统 screencap)
            - 邮件通知

            ### 安装
            1. 下载 `TaskMod-${{ steps.version.outputs.version }}.zip`
            2. 通过 Magisk 刷入
            3. 浏览器访问 `http://设备IP:8080`
          files: TaskMod-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
