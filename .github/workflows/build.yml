name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.2)'
        required: true
        default: 'v1.0.1'

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # 计算 versionCode
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

          # 更新 module.prop
          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

          # 更新 Cargo.toml
          sed -i "0,/^version = \".*\"/s/^version = \".*\"/version = \"$VERSION\"/" server/Cargo.toml

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Commit version bump and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG_VERSION="${{ github.event.inputs.version }}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.prop server/Cargo.toml
          if git diff --cached --quiet; then
            echo "Version files already up to date, skipping commit"
          else
            git commit -m "chore: bump version to $TAG_VERSION"
            git push origin "$BRANCH"
          fi
          # 创建 tag（如果已存在则跳过）
          if git rev-parse "$TAG_VERSION" >/dev/null 2>&1; then
            echo "Tag $TAG_VERSION already exists"
          else
            git tag "$TAG_VERSION"
            git push origin "$TAG_VERSION"
          fi
          echo "Pushed tag: $TAG_VERSION"

      - name: Build Server
        working-directory: server
        run: cargo ndk -t arm64-v8a build --release

      - name: Package Magisk Module
        run: |
          VERSION=${{ steps.version.outputs.version }}

          mkdir -p bin/arm64
          cp server/target/aarch64-linux-android/release/taskmod-server bin/arm64/
          chmod +x bin/arm64/taskmod-server

          zip -r TaskMod-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "server/*" \
            -x ".gitignore" \
            -x "bin/.gitkeep"

      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-${{ steps.version.outputs.version }}
          path: TaskMod-${{ steps.version.outputs.version }}.zip

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: |
          cd /tmp
          mkdir -p gradle-gen && cd gradle-gen
          echo 'rootProject.name = "temp"' > settings.gradle
          gradle wrapper --gradle-version 8.5
          cd "$GITHUB_WORKSPACE/android"
          mkdir -p gradle/wrapper
          cp /tmp/gradle-gen/gradlew /tmp/gradle-gen/gradlew.bat .
          cp /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.jar /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew
          rm -rf /tmp/gradle-gen

      - name: Update APK version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle

          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle

          echo "APK version updated to $VERSION (code: $VERSION_CODE)"

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp android/app/build/outputs/apk/debug/app-debug.apk TaskMod-app-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-APK
          path: TaskMod-app-*.apk

  release:
    needs: [build-server, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT
          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Server artifact
        uses: actions/download-artifact@v4
        with:
          name: TaskMod-${{ steps.version.outputs.version }}
          path: ./release-files

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: TaskMod-APK
          path: ./release-files

      - name: List release files
        run: ls -la ./release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskMod ${{ steps.version.outputs.tag }}
          body: |
            ## TaskMod ${{ steps.version.outputs.version }}

            ### 功能
            - 定时任务调度（每天/指定星期/间隔执行）
            - Web 管理面板 (端口 9527)
            - 屏幕镜像（H.264编码，低延迟）
            - 触摸控制（点击、滑动、按键、文本输入）
            - 息屏操作（不影响后续亮度）
            - 麦克风音频传输
            - 浏览器端录屏（边录边下载）
            - AI 助手（多供应商配置、ADB操作手机、TTS语音）
            - 脚本管理（增删改查、执行）
            - 工作流引擎（可视化流程）
            - 截图管理（系统 screencap）
            - 邮件通知

            ### 安装

            **Magisk 模块 (推荐)**
            1. 下载 `TaskMod-${{ steps.version.outputs.version }}.zip`
            2. 通过 Magisk 刷入
            3. 浏览器访问 `http://设备IP:9527`

            **APK 安装**
            1. 下载 `TaskMod-app-${{ steps.version.outputs.version }}.apk`
            2. 允许安装未知来源应用
            3. 安装并打开
          files: |
            release-files/TaskMod-${{ steps.version.outputs.version }}.zip
            release-files/TaskMod-app-${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false