name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Server
        working-directory: server
        run: cargo ndk -t arm64-v8a build --release

      - name: Package Magisk Module
        run: |
          VERSION=$(grep '^version' server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION"

          # 将编译产物复制到模块目录
          mkdir -p bin/arm64
          cp server/target/aarch64-linux-android/release/taskmod-server bin/arm64/
          chmod +x bin/arm64/taskmod-server

          # 打包 Magisk 模块
          zip -r TaskMod-${VERSION}-ci.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "server/*" \
            -x ".gitignore" \
            -x "bin/.gitkeep"

      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-Magisk-CI
          path: TaskMod-*-ci.zip

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: |
          cd /tmp
          mkdir -p gradle-gen && cd gradle-gen
          echo 'rootProject.name = "temp"' > settings.gradle
          gradle wrapper --gradle-version 8.5
          cd "$GITHUB_WORKSPACE/android"
          mkdir -p gradle/wrapper
          cp /tmp/gradle-gen/gradlew /tmp/gradle-gen/gradlew.bat .
          cp /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.jar /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew
          rm -rf /tmp/gradle-gen

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-APK-CI
          path: android/app/build/outputs/apk/debug/app-debug.apk

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Clippy
        working-directory: server
        run: cargo clippy -- -D warnings

      - name: Check formatting
        working-directory: server
        run: cargo fmt --check