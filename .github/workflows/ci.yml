name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
            daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock', 'daemon/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          echo "version=v${MAJOR}.${NEXT_MINOR}.0-dev" >> $GITHUB_OUTPUT

      - name: Build Server
        working-directory: server
        run: cargo ndk -t arm64-v8a build --release

      - name: Build Daemon
        working-directory: daemon
        run: cargo ndk -t arm64-v8a build --release

      - name: Package Magisk Module
        id: package
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # 将编译产物复制到模块目录
          mkdir -p bin/arm64
          cp server/target/aarch64-linux-android/release/taskmod-server bin/arm64/
          cp daemon/target/aarch64-linux-android/release/taskmod-daemon bin/arm64/
          chmod +x bin/arm64/taskmod-server
          chmod +x bin/arm64/taskmod-daemon

          # 打包 Magisk 模块 (从仓库根目录打包)
          zip -r TaskMod-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "server/*" \
            -x ".gitignore" \
            -x "bin/.gitkeep"

      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-${{ steps.version.outputs.version }}
          path: TaskMod-${{ steps.version.outputs.version }}.zip

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          echo "version=v${MAJOR}.${NEXT_MINOR}.0-dev" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp android/app/build/outputs/apk/debug/app-debug.apk TaskMod-app-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMod-APK-${{ steps.version.outputs.version }}
          path: TaskMod-app-*.apk

  prerelease:
    needs: [build-server, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          echo "version=v${MAJOR}.${NEXT_MINOR}.0-dev" >> $GITHUB_OUTPUT

      - name: Download Server artifact
        uses: actions/download-artifact@v4
        with:
          name: TaskMod-${{ steps.version.outputs.version }}
          path: ./release-files

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: TaskMod-APK-${{ steps.version.outputs.version }}
          path: ./release-files

      - name: List release files
        run: ls -la ./release-files/

      - name: Delete old dev prerelease
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.version.outputs.version }}';
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const rel of releases.data) {
              if (rel.prerelease && rel.tag_name === tagName) {
                try {
                  await github.rest.repos.deleteRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: rel.id
                  });
                  console.log(`Deleted old prerelease: ${rel.tag_name}`);
                } catch (e) {
                  console.log(`Failed to delete ${rel.tag_name}: ${e.message}`);
                }
              }
            }
            // 删除旧 tag
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`
              });
            } catch (e) { /* tag 可能不存在 */ }

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "[预发布] TaskMod ${{ steps.version.outputs.version }}"
          body: |
            ## TaskMod ${{ steps.version.outputs.version }} (预发布)

            > 此版本由 CI 自动构建，基于 main 分支最新提交 `${{ github.sha }}`

            ### 安装

            **Magisk 模块 (推荐)**
            1. 下载 `TaskMod-${{ steps.version.outputs.version }}.zip`
            2. 通过 Magisk 刷入
            3. 浏览器访问 `http://设备IP:9527`

            **APK 安装**
            1. 下载 `TaskMod-app-${{ steps.version.outputs.version }}.apk`
            2. 允许安装未知来源应用
            3. 安装并打开
          files: |
            release-files/TaskMod-${{ steps.version.outputs.version }}.zip
            release-files/TaskMod-app-${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: true
