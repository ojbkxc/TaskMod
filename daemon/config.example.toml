# TaskMod 配置文件示例
# 放置位置: ~/.taskmod/config.toml

# 全局设置
[global]
# cloudflared 版本号
version = "2024.10.1"
# 子进程崩溃后重试间隔（秒）
retry_interval_secs = 5
# 最大重试次数（0 表示无限重试）
max_retries = 10
# 优雅关闭超时（秒）
shutdown_timeout_secs = 10

# 隧道列表（支持多个隧道）
[[tunnels]]
# 隧道名称（唯一标识）
name = "my-tunnel-1"
# Cloudflare Tunnel Token（必填）
token = "eyJhIjoixxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# 是否启用
enabled = true

# 该隧道绑定的服务列表
[[tunnels.services]]
# 服务名称（唯一标识）
name = "web-app"
# 本地服务 URL
url = "http://localhost:8080"
# 是否启用
enabled = true

[[tunnels.services]]
name = "api-server"
url = "http://localhost:3000"
enabled = true

# 第二个隧道示例
[[tunnels]]
name = "my-tunnel-2"
token = "eyJhIjoyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy"
enabled = false

[[tunnels.services]]
name = "staging-app"
url = "http://localhost:8081"
enabled = false